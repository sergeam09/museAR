<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Object Share - Sube y Comparte</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        /* Interfaz PC */
        .pc-interface {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }

        input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 2px dashed #ddd;
            border-radius: 10px;
            cursor: pointer;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #45a049;
        }

        .qr-container {
            text-align: center;
            margin-top: 30px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 10px;
        }

        #qr-code {
            margin: 20px auto;
        }

        .link-container {
            margin-top: 15px;
            word-break: break-all;
        }

        .link-container input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 5px;
            margin-top: 5px;
        }

        .hidden {
            display: none;
        }

        /* Interfaz AR (solo se ve en el teléfono) */
        .ar-interface {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
            background: black;
        }

        #ar-status {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            z-index: 1001;
            font-size: 14px;
        }
    </style>
</head>
<body>

<!-- Interfaz PC: Subir modelo y generar QR -->
<div id="pc-interface" class="pc-interface">
    <h1>📦 AR Object Share</h1>
    
    <div class="input-group">
        <label>1. Sube tu modelo GLB:</label>
        <input type="file" id="model-upload" accept=".glb">
    </div>

    <div id="demo-section" class="input-group">
        <label>O usa el modelo de prueba:</label>
        <button id="use-demo">Usar modelo delfín</button>
    </div>

    <div id="share-section" class="hidden">
        <div class="qr-container">
            <h3>2. Comparte este QR:</h3>
            <div id="qr-code"></div>
            <div class="link-container">
                <label>O este enlace:</label>
                <input type="text" id="share-link" readonly>
                <button id="copy-link">Copiar enlace</button>
            </div>
            <p style="margin-top: 20px; color: #666; font-size: 14px;">
                📱 Escanea el QR con tu teléfono para ver el modelo en AR
            </p>
        </div>
    </div>
</div>

<!-- Interfaz AR: Solo se muestra en el teléfono cuando se recibe un modelo -->
<div id="ar-interface" class="ar-interface hidden"></div>
<div id="ar-status" class="hidden"></div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    // Este es el código completo que maneja TODO
    // Lo separo en secciones para que sea claro
    
    // ========== PARTE 1: DETECTAR SI ES TELÉFONO Y TIENE QR ==========
    
    const urlParams = new URLSearchParams(window.location.search);
    const modelParam = urlParams.get('model');
    
    // Si hay un modelo en la URL (viene del QR), mostrar AR
    if (modelParam) {
        // Modo teléfono: mostrar solo AR
        document.getElementById('pc-interface').classList.add('hidden');
        document.getElementById('ar-interface').classList.remove('hidden');
        document.getElementById('ar-status').classList.remove('hidden');
        iniciarAR(decodeURIComponent(modelParam));
    } else {
        // Modo PC: mostrar interfaz de subida
        document.getElementById('pc-interface').classList.remove('hidden');
        document.getElementById('ar-interface').classList.add('hidden');
        configurarSubida();
    }
    
    // ========== PARTE 2: CONFIGURAR SUBIDA EN PC ==========
    
    function configurarSubida() {
        const modelUpload = document.getElementById('model-upload');
        const useDemo = document.getElementById('use-demo');
        let modeloActual = null;
        
        // Subir archivo propio
        modelUpload.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (file) {
                const url = URL.createObjectURL(file);
                modeloActual = url;
                mostrarCompartir(url);
            }
        });
        
        // Usar modelo demo
        useDemo.addEventListener('click', () => {
            // El delfín necesita estar subido a GitHub o usar uno público
            modeloActual = '/delfin.glb';
            mostrarCompartir(modeloActual);
        });
    }
    
    function mostrarCompartir(modelUrl) {
        document.getElementById('share-section').classList.remove('hidden');
        
        // Generar URL para compartir
        const baseUrl = window.location.origin + window.location.pathname;
        const shareUrl = `${baseUrl}?model=${encodeURIComponent(modelUrl)}`;
        
        // Mostrar enlace
        const linkInput = document.getElementById('share-link');
        linkInput.value = shareUrl;
        
        // Generar QR
        generarQR(shareUrl, 'qr-code');
        
        // Botón copiar
        document.getElementById('copy-link').addEventListener('click', () => {
            linkInput.select();
            document.execCommand('copy');
            alert('Enlace copiado');
        });
    }
    
    function generarQR(texto, elementoId) {
        const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(texto)}`;
        const img = document.createElement('img');
        img.src = qrUrl;
        const contenedor = document.getElementById(elementoId);
        contenedor.innerHTML = '';
        contenedor.appendChild(img);
    }
    
    // ========== PARTE 3: INICIAR AR EN EL TELÉFONO ==========
    
    async function iniciarAR(modelUrl) {
        const statusDiv = document.getElementById('ar-status');
        statusDiv.textContent = 'Iniciando AR...';
        
        // Importar Three.js y AR
        const THREE = await import('three');
        const { ARButton } = await import('three/addons/webxr/ARButton.js');
        const { GLTFLoader } = await import('three/addons/loaders/GLTFLoader.js');
        
        // Configurar escena
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.xr.enabled = true;
        document.getElementById('ar-interface').appendChild(renderer.domElement);
        
        // Luces
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(1, 2, 1);
        scene.add(dirLight);
        
        // Reticle para colocar
        const geometry = new THREE.RingGeometry(0.15, 0.2, 32);
        const material = new THREE.MeshStandardMaterial({ color: 0x00ff00, side: THREE.DoubleSide });
        const reticle = new THREE.Mesh(geometry, material);
        reticle.rotation.x = -Math.PI / 2;
        scene.add(reticle);
        
        let currentModel = null;
        let hitTestSource = null;
        
        // Cargar modelo
        statusDiv.textContent = 'Cargando modelo...';
        const loader = new GLTFLoader();
        
        // Solución para CORS si el modelo es local
        let urlFinal = modelUrl;
        if (modelUrl.startsWith('/') && modelUrl !== '/delfin.glb') {
            // Si es un blob URL, ya está bien
            statusDiv.textContent = 'Usando modelo subido';
        }
        
        loader.load(urlFinal, (gltf) => {
            currentModel = gltf.scene;
            currentModel.visible = false;
            currentModel.scale.set(0.2, 0.2, 0.2);
            scene.add(currentModel);
            statusDiv.textContent = 'Modelo listo. Busca superficies...';
        }, undefined, (error) => {
            console.error(error);
            statusDiv.textContent = 'Error cargando modelo. Usando modelo de respaldo.';
            // Modelo de respaldo
            loader.load('https://threejs.org/examples/models/gltf/Horse.glb', (gltf) => {
                currentModel = gltf.scene;
                currentModel.visible = false;
                currentModel.scale.set(0.2, 0.2, 0.2);
                scene.add(currentModel);
                statusDiv.textContent = 'Modelo respaldo listo';
            });
        });
        
        // Botón AR
        const arButton = ARButton.createButton(renderer, {
            requiredFeatures: ['hit-test'],
            optionalFeatures: ['dom-overlay'],
            domOverlay: { root: document.body }
        });
        document.getElementById('ar-interface').appendChild(arButton);
        
        // Configurar hit test
        renderer.xr.addEventListener('sessionstart', async () => {
            const session = renderer.xr.getSession();
            const viewerSpace = await session.requestReferenceSpace('viewer');
            hitTestSource = await session.requestHitTestSource({ space: viewerSpace });
            
            session.addEventListener('select', () => {
                if (currentModel && reticle.visible) {
                    currentModel.position.copy(reticle.position);
                    currentModel.visible = true;
                    statusDiv.textContent = '¡Objeto colocado!';
                }
            });
        });
        
        // Animación
        function renderFrame(timestamp, frame) {
            if (frame && hitTestSource) {
                const referenceSpace = renderer.xr.getReferenceSpace();
                const hitTestResults = frame.getHitTestResults(hitTestSource);
                if (hitTestResults.length > 0) {
                    const hit = hitTestResults[0];
                    const pose = hit.getPose(referenceSpace);
                    reticle.visible = true;
                    reticle.position.copy(pose.transform.position);
                } else {
                    reticle.visible = false;
                }
            }
            renderer.render(scene, camera);
        }
        
        renderer.setAnimationLoop(renderFrame);
    }
</script>

</body>
</html>
