<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AR Object Share - Sube cualquier modelo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: #1a1a2e;
            color: white;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
        }
        
        .upload-area {
            background: #16213e;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        input[type="file"] {
            margin: 15px 0;
            padding: 10px;
        }
        
        button {
            background: #0f3460;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin: 5px;
        }
        
        button:hover {
            background: #e94560;
        }
        
        .qr-area {
            background: #16213e;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            display: none;
        }
        
        #qr-code {
            margin: 20px auto;
        }
        
        .link-box {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .link-box input {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: none;
        }
        
        .link-box button {
            margin: 0;
        }
        
        .ar-viewer {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
            background: black;
        }
        
        model-viewer {
            width: 100%;
            height: 100%;
        }
        
        .close-ar {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1001;
            background: red;
            padding: 10px 15px;
            border-radius: 50%;
            font-size: 20px;
        }
    </style>
</head>
<body>

<div class="container" id="main-ui">
    <h1>📦 AR Object Share</h1>
    
    <div class="upload-area">
        <h3>1. Sube tu modelo GLB</h3>
        <input type="file" id="model-file" accept=".glb">
        <br>
        <button id="use-demo">Usar modelo demo (Horse)</button>
    </div>
    
    <div class="qr-area" id="qr-area">
        <h3>2. Comparte este QR o enlace</h3>
        <div id="qr-code"></div>
        <div class="link-box">
            <input type="text" id="share-link" readonly>
            <button id="copy-link">Copiar</button>
        </div>
        <p style="font-size: 12px; margin-top: 15px;">📱 Escanea con tu teléfono para ver en AR</p>
    </div>
</div>

<div class="ar-viewer" id="ar-viewer">
    <button class="close-ar" id="close-ar">✕</button>
    <model-viewer id="model-viewer" ar ar-modes="webxr scene-viewer quick-look" camera-controls auto-rotate environment-image="neutral"></model-viewer>
</div>

<script type="module">
    // Importar ModelViewer
    import 'https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js';
    
    // Elementos
    const fileInput = document.getElementById('model-file');
    const useDemoBtn = document.getElementById('use-demo');
    const qrArea = document.getElementById('qr-area');
    const shareLink = document.getElementById('share-link');
    const copyLinkBtn = document.getElementById('copy-link');
    const arViewer = document.getElementById('ar-viewer');
    const closeArBtn = document.getElementById('close-ar');
    const modelViewer = document.getElementById('model-viewer');
    
    let currentModelUrl = null;
    
    // Generar QR
    function generarQR(texto) {
        const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(texto)}`;
        const img = document.createElement('img');
        img.src = qrUrl;
        const div = document.getElementById('qr-code');
        div.innerHTML = '';
        div.appendChild(img);
    }
    
    // Mostrar opciones para compartir
    function mostrarCompartir(url) {
        const baseUrl = window.location.origin + window.location.pathname;
        const shareUrl = `${baseUrl}?model=${encodeURIComponent(url)}`;
        shareLink.value = shareUrl;
        generarQR(shareUrl);
        qrArea.style.display = 'block';
    }
    
    // Subir archivo propio
    fileInput.addEventListener('change', (event) => {
        const file = event.target.files[0];
        if (file && file.name.endsWith('.glb')) {
            const url = URL.createObjectURL(file);
            currentModelUrl = url;
            mostrarCompartir(url);
        } else {
            alert('Por favor sube un archivo .glb');
        }
    });
    
    // Usar modelo demo
    useDemoBtn.addEventListener('click', () => {
        const demoUrl = 'https://threejs.org/examples/models/gltf/Horse.glb';
        currentModelUrl = demoUrl;
        mostrarCompartir(demoUrl);
    });
    
    // Copiar enlace
    copyLinkBtn.addEventListener('click', () => {
        shareLink.select();
        document.execCommand('copy');
        alert('Enlace copiado! Compártelo por WhatsApp o cualquier red');
    });
    
    // Cerrar visor AR
    closeArBtn.addEventListener('click', () => {
        arViewer.style.display = 'none';
    });
    
    // Si la URL tiene parámetro model, abrir AR directamente
    const urlParams = new URLSearchParams(window.location.search);
    const modelParam = urlParams.get('model');
    
    if (modelParam) {
        // Modo teléfono: mostrar AR automáticamente
        document.getElementById('main-ui').style.display = 'none';
        arViewer.style.display = 'block';
        modelViewer.setAttribute('src', decodeURIComponent(modelParam));
    }
</script>

</body>
</html>
