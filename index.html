<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Simple</title>
    <style>
        body { font-family: Arial; text-align: center; padding: 20px; }
        #qr { margin: 20px auto; }
        button { padding: 10px 20px; font-size: 18px; margin: 10px; }
        input { margin: 10px; }
    </style>
</head>
<body>

<h1>📦 Sube tu modelo GLB</h1>
<input type="file" id="fileInput" accept=".glb">
<button id="generateBtn">Generar QR y Enlace</button>

<div id="qr" style="display:none;"></div>
<input type="text" id="link" style="width:300px; display:none;" readonly>
<button id="copyBtn" style="display:none;">Copiar Enlace</button>

<script>
// Generar QR simple
function generarQR(texto) {
    const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(texto)}`;
    const img = document.createElement('img');
    img.src = qrUrl;
    const div = document.getElementById('qr');
    div.innerHTML = '';
    div.appendChild(img);
    div.style.display = 'block';
}

// Cuando suben archivo
document.getElementById('fileInput').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) {
        const url = URL.createObjectURL(file);
        window.modeloURL = url;
        alert('Modelo cargado: ' + file.name);
    }
});

// Generar QR y link
document.getElementById('generateBtn').addEventListener('click', () => {
    if (!window.modeloURL) {
        alert('Primero sube un modelo GLB');
        return;
    }
    
    const base = window.location.origin + window.location.pathname;
    const shareUrl = `${base}?model=${encodeURIComponent(window.modeloURL)}`;
    
    document.getElementById('link').value = shareUrl;
    document.getElementById('link').style.display = 'inline-block';
    document.getElementById('copyBtn').style.display = 'inline-block';
    
    generarQR(shareUrl);
});

// Copiar enlace
document.getElementById('copyBtn').addEventListener('click', () => {
    const link = document.getElementById('link');
    link.select();
    document.execCommand('copy');
    alert('Enlace copiado');
});

// Si la URL tiene modelo, mostrar AR
const urlParams = new URLSearchParams(window.location.search);
const modelParam = urlParams.get('model');
if (modelParam) {
    document.body.innerHTML = '<div id="status">Iniciando AR...</div><div id="ar-container"></div>';
    iniciarAR(decodeURIComponent(modelParam));
}

async function iniciarAR(modelUrl) {
    const THREE = await import('https://unpkg.com/three@0.128.0/build/three.module.js');
    const { ARButton } = await import('https://unpkg.com/three@0.128.0/examples/jsm/webxr/ARButton.js');
    const { GLTFLoader } = await import('https://unpkg.com/three@0.128.0/examples/jsm/loaders/GLTFLoader.js');
    
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.xr.enabled = true;
    document.getElementById('ar-container').appendChild(renderer.domElement);
    
    // Luz
    const light = new THREE.AmbientLight(0xffffff, 0.7);
    scene.add(light);
    const dirLight = new THREE.DirectionalLight(0xffffff, 1);
    dirLight.position.set(1, 2, 1);
    scene.add(dirLight);
    
    // Cargar modelo
    const loader = new GLTFLoader();
    let model;
    loader.load(modelUrl, (gltf) => {
        model = gltf.scene;
        model.scale.set(0.2, 0.2, 0.2);
        scene.add(model);
        document.getElementById('status').innerHTML = '✅ Modelo listo. Toca para colocar';
    }, undefined, (err) => {
        console.error(err);
        document.getElementById('status').innerHTML = '❌ Error cargando modelo';
    });
    
    // AR
    const btn = ARButton.createButton(renderer, { requiredFeatures: ['hit-test'] });
    document.getElementById('ar-container').appendChild(btn);
    
    let reticle;
    const geometry = new THREE.RingGeometry(0.15, 0.2, 32);
    const material = new THREE.MeshStandardMaterial({ color: 0x00ff00 });
    reticle = new THREE.Mesh(geometry, material);
    reticle.rotation.x = -Math.PI / 2;
    scene.add(reticle);
    
    let hitTestSource = null;
    renderer.xr.addEventListener('sessionstart', async () => {
        const session = renderer.xr.getSession();
        const space = await session.requestReferenceSpace('viewer');
        hitTestSource = await session.requestHitTestSource({ space: space });
        session.addEventListener('select', () => {
            if (model && reticle.visible) {
                model.position.copy(reticle.position);
                model.visible = true;
            }
        });
    });
    
    function renderFrame(timestamp, frame) {
        if (frame && hitTestSource) {
            const refSpace = renderer.xr.getReferenceSpace();
            const results = frame.getHitTestResults(hitTestSource);
            if (results.length) {
                const pose = results[0].getPose(refSpace);
                reticle.visible = true;
                reticle.position.copy(pose.transform.position);
            } else {
                reticle.visible = false;
            }
        }
        renderer.render(scene, camera);
    }
    renderer.setAnimationLoop(renderFrame);
}
</script>
</body>
</html>
